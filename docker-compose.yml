services:
  app:
    build: .
    container_name: work-os-app
    ports:
      - "3000:3000"
    restart: always
    volumes:
      # ホストの tmux ソケットをマウント (UID=1000 の場合)
      - /tmp/tmux-1000:/tmp/tmux-1000
      # 起動ディレクトリをホストと共有 (必要に応じて)
      - /mnt/c/var/work:/mnt/c/var/work
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TMUX_SOCKET=/tmp/tmux-1000/default
      # tmux ソケットの場所を明示
      - TMUX_TMPDIR=/tmp
      # ホスト側のエージェントに任せるため、コンテナ内でのコマンド実行パスを合わせる
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: work-os-tunnel
    user: root
    restart: always
    volumes:
      - /home/opa/.cloudflared:/etc/cloudflared
    command: tunnel --cred-file /etc/cloudflared/19a30aca-d60d-465a-81f0-85687ecffcfc.json run --url http://app:3000 19a30aca-d60d-465a-81f0-85687ecffcfc
    depends_on:
      - app
