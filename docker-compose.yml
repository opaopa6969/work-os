services:
  app:
    build: .
    container_name: work-os-app
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - /mnt/c/var/work/work-os/src:/app/src
      - /mnt/c/var/work/work-os/public:/app/public
      - /mnt/c/var/work/work-os/templates:/app/templates
      - /usr/local/bin/tmux:/usr/local/bin/tmux:ro
      - /tmp/tmux-1000:/tmp/tmux-1000
      - /mnt/c/var:/mnt/c/var
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TMUX_SOCKET=/tmp/tmux-1000/default
      - TMUX_TMPDIR=/tmp
      - NEXT_TELEMETRY_DISABLED=1
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: work-os-tunnel
    user: root
    restart: always
    volumes:
      - /home/opa/.cloudflared:/etc/cloudflared
    command: tunnel --cred-file /etc/cloudflared/19a30aca-d60d-465a-81f0-85687ecffcfc.json run --url http://app:3000 19a30aca-d60d-465a-81f0-85687ecffcfc
    depends_on:
      - app
