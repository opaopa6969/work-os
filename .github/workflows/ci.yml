name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit

      - name: Build (Next.js)
        run: npm run build

      - name: TypeScript check
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi
